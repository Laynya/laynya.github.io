<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>お題チェンジャー</title>
    <style>
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            transition: background-color 0.4s ease;
            background-color: #f5f5f5;
            color: #333;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: fixed; /* スクロール防止 */
        }
        
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }
        .screen.active {
            display: block;
        }

        /* 設定画面 */
        #settings-screen-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* プレイ画面（常に横画面） */
        #play-screen-content {
            position: absolute;
            /* 画面中央を基準に回転 */
            width: 100vh;
            height: 100vw;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            background: inherit;
        }
        
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        textarea {
            width: 100%;
            max-width: 400px;
            height: 200px;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ccc;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        button {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background-color: #007bff;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .stop-btn { 
            background-color: #dc3545; 
            position: absolute; 
            bottom: 20px; /* 横画面時の位置調整 */
        }

        #countdown { font-size: 5rem; font-weight: bold; }
        #topic { 
            font-size: 3.5rem; 
            font-weight: bold; 
            text-align: center; 
            width: 80%;
        }
    </style>
</head>
<body>

    <div id="settings-screen" class="screen active">
        <div id="settings-screen-content">
            <h1>お題リスト設定</h1>
            <textarea id="topic-list">初恋の話
最近やらかした失敗
絶対に譲れないこだわり
もし100万円もらったら
おすすめの映画・アニメ
子どもの頃の夢</textarea>
            <button id="start-btn">スタート</button>
            <p style="font-size: 0.8rem; margin-top:10px;">※Androidで動かない場合はブラウザ設定で<br>「動作とライトセンサー」を確認してください</p>
        </div>
    </div>

    <div id="play-screen" class="screen">
        <div id="play-screen-content">
            <div id="countdown"></div>
            <div id="topic" style="display: none;"></div>
            <button id="stop-btn" class="stop-btn" style="display: none;">ストップ</button>
        </div>
    </div>

    <script>
        const settingsScreen = document.getElementById('settings-screen');
        const playScreen = document.getElementById('play-screen');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const topicListArea = document.getElementById('topic-list');
        const countdownEl = document.getElementById('countdown');
        const topicEl = document.getElementById('topic');

        let availableTopics = [];
        let isPlaying = false;
        let isFaceDown = false;
        let wakeLock = null;

        // スリープ防止
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {}
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function changeBackgroundColor() {
            const hue = Math.floor(Math.random() * 360);
            document.body.style.backgroundColor = `hsl(${hue}, 70%, 80%)`;
        }

        function showNextTopic() {
            if (availableTopics.length === 0) {
                topicEl.textContent = "終了";
                isPlaying = false;
                document.body.style.backgroundColor = '#ccc';
                releaseWakeLock();
                return;
            }
            const nextTopic = availableTopics.pop();
            topicEl.textContent = nextTopic;
            changeBackgroundColor();
        }

        function handleMotion(event) {
            if (!isPlaying) return;
            const z = event.accelerationIncludingGravity ? event.accelerationIncludingGravity.z : null;
            if (z === null) return;

            // Androidは端末によってZ軸の正負が逆転する場合があるため絶対値で判定する工夫もできますが、
            // 一般的にはiOS同様「画面を伏せるとマイナス」になります。
            if (z < -6 && !isFaceDown) {
                isFaceDown = true;
                showNextTopic();
            } else if (z > 4 && isFaceDown) {
                isFaceDown = false;
            }
        }

        startBtn.addEventListener('click', async () => {
            const rawTopics = topicListArea.value.split('\n').map(t => t.trim()).filter(t => t !== '');
            if (rawTopics.length === 0) return alert('お題を入力してください');

            availableTopics = shuffleArray([...rawTopics]);

            // iOS用許可リクエスト (Androidでは無視されます)
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try { await DeviceMotionEvent.requestPermission(); } catch (e) {}
            }
            
            window.addEventListener('devicemotion', handleMotion);
            await requestWakeLock();

            settingsScreen.classList.remove('active');
            playScreen.classList.add('active');
            countdownEl.style.display = 'block';
            topicEl.style.display = 'none';
            stopBtn.style.display = 'none';

            let count = 3;
            countdownEl.textContent = count;
            const timer = setInterval(() => {
                count--;
                if (count > 0) countdownEl.textContent = count;
                else if (count === 0) countdownEl.textContent = "START!";
                else {
                    clearInterval(timer);
                    countdownEl.style.display = 'none';
                    topicEl.style.display = 'block';
                    stopBtn.style.display = 'block';
                    isPlaying = true;
                    showNextTopic();
                }
            }, 1000);
        });

        stopBtn.addEventListener('click', () => {
            isPlaying = false;
            window.removeEventListener('devicemotion', handleMotion);
            releaseWakeLock();
            playScreen.classList.remove('active');
            settingsScreen.classList.add('active');
            document.body.style.backgroundColor = '#f5f5f5';
        });
    </script>
</body>
</html>
