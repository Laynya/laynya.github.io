<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お題チェンジャー</title>
    <style>
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            transition: background-color 0.4s ease;
            background-color: #f5f5f5;
            color: #333;
            overflow: hidden;
        }
        
        .screen {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .screen.active {
            display: block;
        }

        #settings-screen-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        #play-screen-content {
            position: absolute;
            width: 100vh;
            height: 100vw;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        p { font-size: 0.9rem; color: #666; margin-bottom: 20px; text-align: center; }
        textarea {
            width: 100%;
            max-width: 400px;
            height: 250px;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ccc;
            border-radius: 8px;
            resize: none;
            margin-bottom: 20px;
        }
        button {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background-color: #007bff;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.2s;
        }
        button:active { transform: scale(0.95); }
        .stop-btn { background-color: #dc3545; position: absolute; bottom: 40px; }

        #countdown { font-size: 6rem; font-weight: bold; color: #333; }
        #topic { 
            font-size: 4rem; 
            font-weight: bold; 
            text-align: center; 
            word-break: break-word;
            padding: 20px;
            width: 90%;
        }
    </style>
</head>
<body>

    <div id="settings-screen" class="screen active">
        <div id="settings-screen-content">
            <h1>お題リスト設定</h1>
            <p>1行に1つのお題を入力してください。</p>
            <textarea id="topic-list">初恋の話
最近やらかした失敗
絶対に譲れないこだわり
もし100万円もらったら
おすすめの映画・アニメ
子どもの頃の夢</textarea>
            <button id="start-btn">スタート</button>
        </div>
    </div>

    <div id="play-screen" class="screen">
        <div id="play-screen-content">
            <div id="countdown"></div>
            <div id="topic" style="display: none;"></div>
            <button id="stop-btn" class="stop-btn" style="display: none;">ストップ</button>
        </div>
    </div>

    <script>
        const settingsScreen = document.getElementById('settings-screen');
        const playScreen = document.getElementById('play-screen');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const topicListArea = document.getElementById('topic-list');
        const countdownEl = document.getElementById('countdown');
        const topicEl = document.getElementById('topic');

        let availableTopics = [];
        let isPlaying = false;
        let isFaceDown = false;
        let wakeLock = null; // スリープ防止用

        // --- スリープ防止機能 (Wake Lock) ---
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock is active (画面点灯維持中)');
                } catch (err) {
                    console.error(`${err.name}, ${err.message}`);
                }
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
                console.log('Wake Lock released (スリープ制限解除)');
            }
        }

        // --- お題制御ロジック ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function changeBackgroundColor() {
            const hue = Math.floor(Math.random() * 360);
            const saturation = 60 + Math.floor(Math.random() * 20);
            const lightness = 70 + Math.floor(Math.random() * 20);
            document.body.style.backgroundColor = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        }

        function showNextTopic() {
            if (availableTopics.length === 0) {
                topicEl.textContent = "終了";
                isPlaying = false;
                document.body.style.backgroundColor = '#e0e0e0';
                releaseWakeLock(); // 全て終わったらスリープ制限を解除
                return;
            }
            
            const nextTopic = availableTopics.pop();
            topicEl.textContent = nextTopic;
            changeBackgroundColor();
        }

        function handleMotion(event) {
            if (!isPlaying) return;
            const z = event.accelerationIncludingGravity ? event.accelerationIncludingGravity.z : null;
            if (z === null) return;

            if (z < -6 && !isFaceDown) {
                isFaceDown = true;
                showNextTopic();
            } else if (z > 4 && isFaceDown) {
                isFaceDown = false;
            }
        }

        // --- イベントリスナー ---
        startBtn.addEventListener('click', async () => {
            const rawTopics = topicListArea.value.split('\n').map(t => t.trim()).filter(t => t !== '');
            if (rawTopics.length === 0) {
                alert('お題を1つ以上入力してください。');
                return;
            }

            availableTopics = shuffleArray([...rawTopics]);

            // センサー許可 (iOS対応)
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceMotionEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('devicemotion', handleMotion);
                    } else {
                        alert('センサー許可が必要です。');
                        return;
                    }
                } catch (error) {
                    alert('許可リクエストに失敗しました。');
                    return;
                }
            } else {
                window.addEventListener('devicemotion', handleMotion);
            }

            // スリープ防止を開始
            await requestWakeLock();

            settingsScreen.classList.remove('active');
            playScreen.classList.add('active');
            countdownEl.style.display = 'block';
            topicEl.style.display = 'none';
            stopBtn.style.display = 'none';
            document.body.style.backgroundColor = '#f5f5f5';

            let count = 3;
            countdownEl.textContent = count;
            
            const countdownInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownEl.textContent = count;
                } else if (count === 0) {
                    countdownEl.textContent = "スタート！";
                } else {
                    clearInterval(countdownInterval);
                    countdownEl.style.display = 'none';
                    topicEl.style.display = 'block';
                    stopBtn.style.display = 'block';
                    isPlaying = true;
                    showNextTopic();
                }
            }, 1000);
        });

        stopBtn.addEventListener('click', () => {
            isPlaying = false;
            window.removeEventListener('devicemotion', handleMotion);
            releaseWakeLock(); // 中断時にスリープ制限を解除
            
            playScreen.classList.remove('active');
            settingsScreen.classList.add('active');
            document.body.style.backgroundColor = '#f5f5f5';
            isFaceDown = false;
        });

        // タブが切り替わった際にWake Lockが自動解除されるため、戻ってきた時に再取得するように設定
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && isPlaying) {
                await requestWakeLock();
            }
        });
    </script>
</body>
</html>
